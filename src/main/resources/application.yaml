spring:
  application:
    name: user-importer
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/mydb
    username: admin
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  docker:
    compose:
      enabled: true

file-storage:
  location: uploads

access-policy:
  workday-start: "06:00"
  workday-end: "22:00"
  max-active-tasks-per-user: 1
